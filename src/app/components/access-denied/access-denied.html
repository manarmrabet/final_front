<div class="access-wrapper">

  <!-- Background -->
  <div class="bg-effects">
    <div class="blur-circle c1"></div>
    <div class="blur-circle c2"></div>
    <div class="grid-overlay"></div>
  </div>

  <!-- Card -->
  <div class="access-card">

    <div class="badge">Accès Restreint</div>

    <h1 class="code">403</h1>
    <h2 class="title">Accès refusé</h2>

    <p class="subtitle">
      Vous n'avez pas les permissions nécessaires pour accéder à cette ressource.
    </p>

    <div class="info-box">
      <span class="icon">🔒</span>
      <p>Contactez votre administrateur pour obtenir les droits nécessaires.</p>
    </div>

    <button class="btn-main" (click)="goToDashboard()">
      ← Retour au Dashboard
    </button>

  </div>
</div>
