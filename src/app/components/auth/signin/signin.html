<div class="auth-page">
  <div class="auth-page-wrapper">
    <div class="auth-card">

      <div class="auth-left">
        <div class="auth-overlay"></div>
        <div class="dots-pattern"></div>
        <div class="left-content">
          <div class="auth-brand">
            <div class="brand-header">
              <div class="brand-logo-box"></div>
              <span class="brand-text">COFAT <span>WMS</span></span>
            </div>
            <div class="brand-bar"></div>
          </div>

          <div class="auth-quote">
            <div class="quote-marks">“</div>
            <p class="quote-body">
              Optimisez votre chaîne logistique avec notre solution intelligente de gestion d'entrepôt en temps réel.
            </p>
          </div>
        </div>
      </div>

      <div class="auth-right">
        <div class="right-content">
          <div class="form-header">
            <h5>Welcome Back !</h5>
            <p>Connectez-vous pour accéder à COFAT.</p>
          </div>

          <form [formGroup]="form" (ngSubmit)="onSubmit()" autocomplete="off">
            <div class="form-group">
              <label>Nom d'utilisateur</label>
              <input
                type="text"
                class="form-input"
                placeholder="Ex: admin_cofat"
                formControlName="username"
              />
            </div>

            <div class="form-group">
              <div style="display: flex; justify-content: space-between;">
                <label>Mot de passe</label>
                <a href="#" style="font-size: 0.8rem; color: #0061ff; text-decoration: none;">Oublié ?</a>
              </div>
              <div class="input-pw-wrap">
                <input
                  [type]="showPwd() ? 'text' : 'password'"
                  class="form-input"
                  placeholder="••••••••"
                  formControlName="password"
                />
                <button type="button" class="eye-btn" (click)="showPwd.set(!showPwd())">
                  <svg *ngIf="!showPwd()" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                  <svg *ngIf="showPwd()" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </button>
              </div>
            </div>

            <button type="submit" class="btn-signin" [disabled]="loading() || form.invalid">
              {{ loading() ? 'Chargement...' : 'Se connecter' }}
            </button>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>
